name: 'finance_analytics'
version: '1.0.0'
config-version: 2

profile: 'finance_analytics'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# ============================================================
# Model materialization strategy:
#   staging  -> views (lightweight, always fresh from source)
#   intermediate -> views (transformation logic, no storage cost)
#   marts    -> tables (optimized for query performance)
# ============================================================
models:
  finance_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

seeds:
  finance_analytics:
    +schema: raw
